services:
  - type: web
    name: world-cup-2026-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOW_ALL_ORIGINS
        value: "true"

  - type: web
    name: world-cup-2026-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: world-cup-2026-api
          property: hostport
